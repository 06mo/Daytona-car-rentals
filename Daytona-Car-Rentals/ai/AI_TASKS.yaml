- id: DCR-068
  title: Implement coverage decision engine
  owner: Codex
  status: complete
  depends_on:
      - DCR-064
      - DCR-065
  deliverable: lib/insurance/evaluateCoverage.ts, lib/services/coverageDecisionService.ts
  prompt: |
      Implement DCR-068 for Daytona Car Rentals.

      Read first:
      - ai/DCR-063-insurance-control-plane.md
      - ai/DCR-050-abi-coverage-alignment.md
      - types/insurance.ts
      - current protection package logic
      - current risk scoring logic
      - booking service/state machine

      Goal:
      Centralize all insurance/coverage approval logic into one server-authoritative coverage decision engine.

      Required deliverables:
      1. Create:
         - lib/insurance/rules.ts
         - lib/insurance/evaluateCoverage.ts
         - lib/services/coverageDecisionService.ts
      2. Ensure booking confirmation paths can consume this engine
      3. Persist a normalized coverage decision record after evaluation

      Required core function (or equivalent):
      evaluateCoverageDecision({
        bookingId,
        userId,
        vehicleId,
        rentalChannel,
        protectionPackage,
        startDate,
        endDate,
        riskLevel
      })

      Required rule matrix:
      1. Direct + Basic
         - approve only if renter insurance is verified and no blocking reasons remain
      2. Direct + Standard
         - approve if renter insurance verified OR embedded coverage later binds successfully
         - until provider integration exists, support a clean not-yet-bound/manual-review path
      3. Direct + Premium
         - same general logic as standard but may be unavailable for high-risk bookings
      4. Platform
         - require approved platform metadata / trip linkage where appropriate
         - coverage source should resolve to platform_policy when valid
      5. Partner
         - require partner association and declared coverage responsibility
         - resolve to partner_policy or reject/manual review

      Output requirements:
      - always return one status
      - always return one coverage source
      - always return machine-readable reasons
      - no ambiguous null-state decisions

      Constraints:
      - keep business logic unit-testable and mostly pure where possible
      - use normalized insurance verification inputs only
      - do not let route handlers implement ad hoc rule branches outside this engine
      - manual_review vs rejected should be consistent and explainable

      Acceptance criteria:
      - all final booking confirmation logic can rely on this engine
      - decision record persisted cleanly
      - direct/platform/partner logic is separated
      - engine compiles without leaking provider-specific response shapes

      Return:
      - changed files
      - decision matrix summary
      - any assumptions for provider-not-yet-integrated paths

