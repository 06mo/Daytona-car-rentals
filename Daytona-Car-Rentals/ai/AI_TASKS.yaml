- id: DCR-063
  title: Design insurance control plane
  owner: Claude
  status: complete
  depends_on:
      - DCR-050
      - DCR-062
  deliverable: ai/DCR-063-insurance-control-plane.md
  prompt: |
      You are the principal systems architect for Daytona Car Rentals.

      Context:
      - Existing stack: Next.js 15, Firebase Admin/Client, Firestore, Firebase Storage, Stripe, Tailwind CSS, TypeScript.
      - Existing product already includes: booking flow, magic-link auth, guest booking recovery, admin dashboard, protection packages, risk scoring, checklist workflows, booking adjustments, audit logging, analytics, notifications.
      - Current problem: payment and booking confirmation are too closely coupled, while insurance eligibility and coverage source need to become a server-authoritative control layer.
      - Existing protection packages:
        - basic: renter must have acceptable own insurance
        - standard: intended to support Daytona-managed protection / future embedded coverage
        - premium: intended to support stronger protection with tighter risk controls
      - ABI alignment already documented in DCR-050, but Daytona now needs an internal insurance control plane that can support direct, platform, and partner bookings.

      Produce a repo-ready architecture spec at:
      ai/DCR-063-insurance-control-plane.md

      The spec must define:
      1. Domain concepts:
         - insurance verification
         - coverage decision
         - coverage source
         - rental channel
         - provider adapter
         - manual review
         - override
      2. Canonical enums:
         - RentalChannel = direct | platform | partner
         - InsuranceVerificationStatus = unsubmitted | pending | verified | rejected | expired | unverifiable
         - CoverageDecisionStatus = approved | manual_review | rejected
         - CoverageSource = renter_policy | embedded_policy | platform_policy | partner_policy | none
      3. Booking lifecycle changes:
         - separate payment success from booking confirmation
         - include intermediate states such as payment_authorized, insurance_pending, insurance_manual_review, insurance_cleared
      4. Service boundaries:
         - lib/insurance/
         - lib/services/insuranceVerificationService.ts
         - lib/services/coverageDecisionService.ts
         - lib/services/claimsEvidenceService.ts
      5. Channel-aware coverage logic for:
         - direct bookings
         - approved platform bookings
         - partner bookings
      6. Admin override workflow:
         - who can override
         - required reason
         - audit requirements
         - effect on booking state
      7. Failure paths:
         - payment succeeded but insurance failed
         - provider unavailable
         - customer uploaded invalid insurance
         - booking times out waiting for clearance
      8. Clear acceptance criteria for downstream implementation tasks DCR-064 to DCR-072

      Output requirements:
      - Write in the same style as the existing Daytona architecture/task docs.
      - Be implementation-oriented, not theoretical.
      - Include recommended folder structure.
      - Include explicit state transition table.
      - Include “non-goals” to prevent scope creep.
      - Do not write code yet; this is a design/spec task only.

- id: DCR-064
  title: Implement insurance domain types and Firestore schema
  owner: Codex
  status: complete
  depends_on:
      - DCR-063
  deliverable: types/insurance.ts, Firestore schema/rules/index updates
  prompt: |
      Implement DCR-064 for Daytona Car Rentals.

      Read first:
      - ai/DCR-063-insurance-control-plane.md
      - ai/DCR-050-abi-coverage-alignment.md
      - existing types in types/
      - existing Firestore patterns, firestore.rules, firestore.indexes.json, lib/firebase/, lib/services/

      Goal:
      Add the insurance domain model and Firestore schema needed for insurance verification, coverage decisions, and policy event tracking.

      Required deliverables:
      1. Create:
         - types/insurance.ts
      2. Export it from:
         - types/index.ts
      3. Add Firestore-backed schema support for:
         - insurance_verifications
         - coverage_decisions
         - policy_events
         - claims_evidence (top-level collection or equivalent justified structure)
      4. Extend booking/domain types and service models with insurance summary fields.

      Required enums/types:
      - RentalChannel = "direct" | "platform" | "partner"
      - InsuranceVerificationStatus = "unsubmitted" | "pending" | "verified" | "rejected" | "expired" | "unverifiable"
      - CoverageDecisionStatus = "approved" | "manual_review" | "rejected"
      - CoverageSource = "renter_policy" | "embedded_policy" | "platform_policy" | "partner_policy" | "none"

      Required interfaces:
      - InsuranceVerification
      - CoverageDecision
      - PolicyEvent
      - ClaimsEvidencePackage (or stored equivalent metadata type)
      - booking summary extensions as needed

      Booking document additions should support:
      - rentalChannel
      - coverageDecisionStatus
      - coverageSource
      - insuranceVerificationStatus
      - insuranceClearedAt
      - insuranceReviewedAt
      - insuranceOverrideApplied
      - insuranceBlockingReasons
      - paymentAuthorizedAt
      - platformTripId
      - partnerId

      Security/rules requirements:
      - No client-authoritative writes to insurance_verifications or coverage_decisions
      - Admin read access where appropriate
      - Customer access should stay limited to their own booking summaries via controlled APIs, not broad direct writes
      - Preserve existing security posture

      Implementation constraints:
      - Keep backward compatibility with current codebase
      - Do not break existing booking/customer/admin pages
      - Follow current naming/style conventions
      - Update firestore.rules and firestore.indexes.json only as needed
      - Add minimal helper types/utilities only where justified

      Acceptance criteria:
      - TypeScript compiles cleanly
      - New types are barrel-exported
      - Firestore rules remain coherent and least-privilege
      - Existing booking flow still compiles
      - No client-side module becomes the source of truth for insurance state

      Return:
      - a concise summary of changed files
      - any migration assumptions
      - any indexes added

- id: DCR-065
  title: Implement renter policy verification workflow
  owner: Codex
  status: complete
  depends_on:
      - DCR-064
      - DCR-066
  deliverable: lib/services/insuranceVerificationService.ts, app/api/insurance/verify-renter-policy/route.ts
  prompt: |
      Implement DCR-065 for Daytona Car Rentals.

      Read first:
      - ai/DCR-063-insurance-control-plane.md
      - types/insurance.ts
      - existing document workflow:
        - lib/services/documentService.ts
        - components/documents/
        - app/api/documents/
        - app/api/me/verification/
      - existing auth/rate-limit/audit patterns

      Goal:
      Create a normalized renter insurance verification workflow that converts uploaded policy evidence and/or insurer verification results into a single internal insurance verification record.

      Required deliverables:
      1. Create:
         - lib/services/insuranceVerificationService.ts
         - lib/insurance/normalize.ts
      2. Add:
         - app/api/insurance/verify-renter-policy/route.ts
      3. Add any small supporting types/helpers needed to normalize decisions.
      4. Reuse existing audit logging and monitoring patterns where appropriate.

      Required workflow behavior:
      - Customer uploads insurance document or otherwise initiates verification
      - Server creates/updates an insurance_verifications record with pending status
      - Verification result is normalized into one of:
        - verified
        - rejected
        - unverifiable
        - expired
      - Result stores machine-readable normalized reasons

      Minimum normalized reason set:
      - policy_not_active
      - name_mismatch
      - liability_limits_too_low
      - rental_use_excluded
      - peer_to_peer_excluded
      - commercial_use_excluded
      - document_unreadable
      - missing_required_fields
      - manual_review_required

      Required service APIs (or equivalent clean design):
      - createInsuranceVerificationRequest(...)
      - finalizeInsuranceVerification(...)
      - getLatestInsuranceVerificationForBooking(...)
      - summarizeInsuranceVerificationForBooking(...)

      API route requirements:
      - auth required
      - customer must own booking unless admin
      - safe validation for bookingId / vehicleId linkage
      - returns a normalized insurance verification summary, not raw sensitive internals
      - rate limited
      - auditable

      Important constraints:
      - Do not let generic document upload alone imply verified insurance
      - Do not expose raw provider payloads to the client
      - Rejected/expired verification must be distinguishable from merely missing
      - Keep provider-specific logic abstractable for DCR-069/DCR-070

      Nice-to-have:
      - if no live provider yet, implement a clean manual-review-first path that still creates normalized records

      Acceptance criteria:
      - New workflow compiles and integrates with current booking/auth patterns
      - Verification state is stored independently from generic documents
      - Machine-readable reasons are persisted
      - Future provider integration can plug in without rewriting route contracts

      Return:
      - changed files
      - route contract
      - any follow-up hooks needed for UI wiring

- id: DCR-066
  title: Add booking status split payment authorized vs insurance cleared
  owner: Codex
  status: complete
  depends_on:
      - DCR-063
      - DCR-064
  deliverable: booking flow + Stripe handling updates
  prompt: |
      Implement DCR-066 for Daytona Car Rentals.

      Read first:
      - ai/DCR-063-insurance-control-plane.md
      - existing booking state logic:
        - lib/services/bookingService.ts
        - app/api/bookings/create/route.ts
        - app/api/stripe/create-payment-intent/route.ts
        - lib/stripe/server.ts
        - lib/stripe/webhooks.ts
        - booking/customer/admin detail pages and status badges

      Goal:
      Separate payment success from final booking confirmation by introducing a proper post-payment insurance gate.

      Required behavior:
      1. Payment success or authorization must not directly imply confirmed booking
      2. Booking flow must support these intermediate states, at minimum:
         - payment_authorized
         - insurance_pending
         - insurance_manual_review
         - insurance_cleared
      3. confirmed should happen only after coverage is actually cleared
      4. booking/customer/admin views must distinguish:
         - payment received / authorized
         - insurance still pending
         - insurance manual review
         - insurance cleared / confirmed

      Required code changes:
      - update booking status model and transition guards
      - update Stripe webhook handling so successful payment does NOT auto-confirm booking
      - store paymentAuthorizedAt when appropriate
      - ensure booking create / payment intent flow remains server-authoritative
      - do not break existing refund/cancel logic

      Required UX behavior:
      - customer should see a clear pending-insurance message after payment where applicable
      - admin should see exactly why a paid booking is not yet confirmed

      Constraints:
      - preserve backward compatibility where practical
      - do not silently reinterpret historical bookings in a dangerous way
      - keep notification semantics correct: payment received is not the same as booking confirmed
      - reuse existing state machine patterns

      Acceptance criteria:
      - paid bookings are not automatically confirmed
      - booking states and transitions compile cleanly
      - admin/customer booking detail pages reflect new statuses coherently
      - no route assumes payment success equals insurance clearance

      Return:
      - changed files
      - status migration assumptions
      - any follow-up UI text changes needed

